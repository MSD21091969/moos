<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collider Graph 3D Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", -apple-system, sans-serif;
        background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
        color: #e0e0e0;
        overflow: hidden;
      }
      #container {
        width: 100vw;
        height: 100vh;
      }

      .controls {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(15, 15, 35, 0.9);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(100, 100, 255, 0.3);
        border-radius: 12px;
        padding: 20px;
        z-index: 1000;
        min-width: 280px;
      }

      .controls h2 {
        font-size: 1.1rem;
        margin-bottom: 15px;
        color: #8888ff;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .legend {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 15px;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.85rem;
      }

      .legend-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
      }

      .btn {
        background: linear-gradient(135deg, #4040a0 0%, #6060c0 100%);
        border: none;
        color: white;
        padding: 10px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.85rem;
        width: 100%;
        margin-top: 10px;
        transition: all 0.2s;
      }

      .btn:hover {
        background: linear-gradient(135deg, #5050b0 0%, #7070d0 100%);
        transform: translateY(-1px);
      }

      .stats {
        position: fixed;
        bottom: 20px;
        left: 20px;
        background: rgba(15, 15, 35, 0.9);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(100, 100, 255, 0.3);
        border-radius: 12px;
        padding: 15px 20px;
        font-size: 0.8rem;
        z-index: 1000;
      }

      .tooltip {
        position: fixed;
        background: rgba(20, 20, 50, 0.95);
        border: 1px solid rgba(100, 150, 255, 0.5);
        border-radius: 8px;
        padding: 12px 16px;
        pointer-events: none;
        z-index: 2000;
        display: none;
        max-width: 300px;
        font-size: 0.85rem;
      }

      .tooltip h4 {
        color: #88aaff;
        margin-bottom: 6px;
      }
      .tooltip .type {
        color: #aaa;
        font-size: 0.75rem;
      }
      .tooltip .r-value {
        color: #ff88aa;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div id="container"></div>

    <div class="controls">
      <h2>🔮 Collider Graph</h2>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-dot" style="background: #ff6b6b"></div>
          <span>UserObject (R=0)</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background: #4ecdc4"></div>
          <span>Container (R=1+)</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background: #a855f7"></div>
          <span>Definition (Blueprint)</span>
        </div>
        <div class="legend-item">
          <div
            class="legend-dot"
            style="
              background: #ffd93d;
              width: 20px;
              height: 3px;
              border-radius: 2px;
            "
          ></div>
          <span>Link (Wiring)</span>
        </div>
      </div>
      <button class="btn" onclick="resetCamera()">🎯 Reset View</button>
      <button class="btn" onclick="toggleAutoRotate()">
        🔄 Toggle Rotation
      </button>
      <button class="btn" onclick="randomizeGraph()">🎲 New Graph</button>
    </div>

    <div class="stats" id="stats">
      Nodes: <span id="nodeCount">0</span> | Links:
      <span id="linkCount">0</span> | Max R: <span id="maxR">0</span>
    </div>

    <div class="tooltip" id="tooltip">
      <h4 id="tt-name"></h4>
      <div class="type" id="tt-type"></div>
      <div class="r-value" id="tt-r"></div>
    </div>

    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://unpkg.com/3d-force-graph@1.73.0/dist/3d-force-graph.min.js"></script>

    <script>
      // === MOCK DATA GENERATOR ===
      function generateColliderGraph() {
        const nodes = [];
        const links = [];
        let nodeId = 0;

        // UserObject (R=0 root)
        const userObj = {
          id: nodeId++,
          name: "UserObject",
          type: "user_object",
          r: 0,
          color: "#ff6b6b",
          size: 12,
        };
        nodes.push(userObj);

        // Definitions (blueprints, float above)
        const defNames = [
          "EmailParser",
          "Summarizer",
          "DataFetcher",
          "Validator",
          "Transformer",
        ];
        const definitions = defNames.map((name, i) => ({
          id: nodeId++,
          name: `Def:${name}`,
          type: "definition",
          r: -1, // Definitions at R=-1 (above the graph)
          color: "#a855f7",
          size: 8,
        }));
        nodes.push(...definitions);

        // R=1 Containers (owned by UserObject)
        const r1Count = 2 + Math.floor(Math.random() * 3);
        const r1Containers = [];
        for (let i = 0; i < r1Count; i++) {
          const container = {
            id: nodeId++,
            name: `Container_R1_${i}`,
            type: "container",
            r: 1,
            color: "#4ecdc4",
            size: 10,
            definitionId: definitions[i % definitions.length].id,
          };
          r1Containers.push(container);
          nodes.push(container);

          // Link from UserObject
          links.push({
            source: userObj.id,
            target: container.id,
            type: "owns",
            color: "#ffd93d",
          });

          // Link to Definition
          links.push({
            source: container.id,
            target: container.definitionId,
            type: "instance_of",
            color: "#a855f7",
            dashed: true,
          });
        }

        // R=2 Containers (nested)
        const r2Containers = [];
        r1Containers.forEach((parent, pi) => {
          const childCount = Math.floor(Math.random() * 3);
          for (let i = 0; i < childCount; i++) {
            const container = {
              id: nodeId++,
              name: `Container_R2_${pi}_${i}`,
              type: "container",
              r: 2,
              color: "#45b7aa",
              size: 8,
              definitionId: definitions[(pi + i + 2) % definitions.length].id,
            };
            r2Containers.push(container);
            nodes.push(container);

            links.push({
              source: parent.id,
              target: container.id,
              type: "owns",
              color: "#ffd93d",
            });

            links.push({
              source: container.id,
              target: container.definitionId,
              type: "instance_of",
              color: "#a855f7",
              dashed: true,
            });
          }
        });

        // R=3 Containers (deep nesting)
        r2Containers.forEach((parent, pi) => {
          if (Math.random() > 0.5) {
            const container = {
              id: nodeId++,
              name: `Container_R3_${pi}`,
              type: "container",
              r: 3,
              color: "#3a9d92",
              size: 6,
              definitionId: definitions[pi % definitions.length].id,
            };
            nodes.push(container);

            links.push({
              source: parent.id,
              target: container.id,
              type: "owns",
              color: "#ffd93d",
            });

            links.push({
              source: container.id,
              target: container.definitionId,
              type: "instance_of",
              color: "#a855f7",
              dashed: true,
            });
          }
        });

        // Cross-links between containers (data flow)
        const containers = nodes.filter((n) => n.type === "container");
        for (let i = 0; i < 3; i++) {
          const src = containers[Math.floor(Math.random() * containers.length)];
          const tgt = containers[Math.floor(Math.random() * containers.length)];
          if (src.id !== tgt.id && src.r <= tgt.r) {
            links.push({
              source: src.id,
              target: tgt.id,
              type: "data_flow",
              color: "#60a0ff",
            });
          }
        }

        return { nodes, links };
      }

      // === GRAPH INSTANCE ===
      let graphData = generateColliderGraph();
      let autoRotate = true;

      const Graph = ForceGraph3D()(document.getElementById("container"))
        .graphData(graphData)
        .backgroundColor("#0f0f23")
        .nodeLabel((node) => "")
        .nodeColor((node) => node.color)
        .nodeVal((node) => node.size)
        .nodeOpacity(0.9)
        .linkColor((link) => link.color)
        .linkOpacity(0.6)
        .linkWidth((link) => (link.type === "owns" ? 2 : 1))
        .linkDirectionalParticles((link) => (link.type === "data_flow" ? 3 : 0))
        .linkDirectionalParticleSpeed(0.01)
        .linkDirectionalParticleColor(() => "#60a0ff")
        .linkLineDash((link) => (link.dashed ? [2, 2] : null))
        .onNodeHover(handleNodeHover)
        .d3Force("charge", d3.forceManyBody().strength(-120))
        .d3Force(
          "link",
          d3.forceLink().distance((link) => {
            if (link.type === "instance_of") return 80;
            return 50;
          })
        );

      // Position nodes by R-value on Y axis
      Graph.d3Force("y", d3.forceY((node) => -node.r * 60).strength(0.3));

      // Camera controls
      Graph.cameraPosition({ x: 200, y: 100, z: 200 });

      // Auto-rotate
      let angle = 0;
      function animate() {
        if (autoRotate) {
          angle += 0.002;
          const radius = 300;
          Graph.cameraPosition({
            x: radius * Math.sin(angle),
            y: 100 + 50 * Math.sin(angle * 0.5),
            z: radius * Math.cos(angle),
          });
        }
        requestAnimationFrame(animate);
      }
      animate();

      // === UI FUNCTIONS ===
      function resetCamera() {
        Graph.cameraPosition(
          { x: 200, y: 100, z: 200 },
          { x: 0, y: 0, z: 0 },
          1000
        );
        angle = 0;
      }

      function toggleAutoRotate() {
        autoRotate = !autoRotate;
      }

      function randomizeGraph() {
        graphData = generateColliderGraph();
        Graph.graphData(graphData);
        updateStats();
      }

      function updateStats() {
        document.getElementById("nodeCount").textContent =
          graphData.nodes.length;
        document.getElementById("linkCount").textContent =
          graphData.links.length;
        document.getElementById("maxR").textContent = Math.max(
          ...graphData.nodes.map((n) => n.r)
        );
      }

      function handleNodeHover(node) {
        const tooltip = document.getElementById("tooltip");
        if (node) {
          tooltip.style.display = "block";
          tooltip.style.left = `${event.clientX + 15}px`;
          tooltip.style.top = `${event.clientY + 15}px`;
          document.getElementById("tt-name").textContent = node.name;
          document.getElementById("tt-type").textContent = node.type
            .replace("_", " ")
            .toUpperCase();
          document.getElementById("tt-r").textContent = `R-value: ${node.r}`;
        } else {
          tooltip.style.display = "none";
        }
      }

      updateStats();
    </script>
  </body>
</html>
