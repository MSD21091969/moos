<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mo:os — Explorer (FUN02 UI_Lens)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", "Calibri", sans-serif;
            background: #0b1220;
            color: #dbe7ff;
        }

        header {
            padding: 12px 20px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 {
            font-size: 16px;
            font-weight: 600;
        }

        header .badge {
            font-size: 11px;
            background: #238636;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .container {
            display: flex;
            height: calc(100vh - 48px);
        }

        .sidebar {
            width: 340px;
            overflow-y: auto;
            border-right: 1px solid #27364f;
            padding: 12px;
            background: #101a2d;
        }

        .sidebar h2 {
            font-size: 13px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .node-card {
            background: #172238;
            border: 1px solid #30415f;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .node-card:hover {
            border-color: #58a6ff;
        }

        .node-card .urn {
            font-size: 12px;
            font-family: monospace;
            color: #58a6ff;
            word-break: break-all;
        }

        .node-meta {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .kind-pill {
            font-size: 10px;
            font-weight: 600;
            border-radius: 999px;
            padding: 2px 8px;
            color: #0d1117;
        }

        .stratum-pill {
            font-size: 10px;
            color: #9fb4d7;
            border: 1px solid #3a5277;
            border-radius: 999px;
            padding: 2px 8px;
        }

        .category-pill {
            font-size: 9px;
            color: #9fb4d7;
            border: 1px solid #3a5277;
            border-radius: 999px;
            padding: 1px 6px;
        }

        .controls {
            margin-bottom: 12px;
            display: grid;
            gap: 8px;
        }

        .controls label {
            display: flex;
            gap: 8px;
            font-size: 12px;
            color: #9fb4d7;
            align-items: center;
        }

        .canvas-area {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .node circle {
            stroke-width: 2;
        }

        .node text {
            fill: #c9d1d9;
            font-size: 10px;
            font-family: monospace;
        }

        .edge line {
            stroke: #4a5f83;
            stroke-width: 1.5;
        }

        .edge text {
            fill: #7f9cc7;
            font-size: 9px;
            font-family: monospace;
        }

        .stats {
            font-size: 11px;
            color: #8b949e;
            margin-bottom: 12px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }

        .search-box {
            width: 100%;
            box-sizing: border-box;
            background: #0d1117;
            border: 1px solid #27364f;
            color: #c9d1d9;
            border-radius: 4px;
            padding: 6px 8px;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .search-box::placeholder {
            color: #484f58;
        }

        .search-box:focus {
            outline: none;
            border-color: #388bfd;
        }

        .scope-select {
            width: 100%;
            box-sizing: border-box;
            background: #0d1117;
            border: 1px solid #27364f;
            color: #c9d1d9;
            border-radius: 4px;
            padding: 6px 8px;
            font-size: 12px;
            margin-bottom: 6px;
        }

        .scope-label {
            font-size: 11px;
            color: #8b949e;
            margin-bottom: 10px;
        }

        svg {
            cursor: grab;
        }

        svg.dragging {
            cursor: grabbing;
            user-select: none;
        }

        .node.dim circle {
            opacity: 0.07 !important;
        }

        .node.dim text {
            opacity: 0.07 !important;
        }

        .node.highlighted circle {
            stroke: #ffd700 !important;
            stroke-width: 3 !important;
        }

        .activity-panel {
            width: 300px;
            overflow-y: auto;
            border-left: 1px solid #27364f;
            padding: 12px;
            background: #0e1724;
            display: flex;
            flex-direction: column;
        }

        .activity-panel h2 {
            font-size: 13px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        .activity-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .activity-item {
            background: #112131;
            border: 1px solid #1e3050;
            border-radius: 4px;
            padding: 6px 8px;
            font-size: 10px;
            font-family: monospace;
            word-break: break-all;
            animation: fadein 0.3s ease;
        }

        .activity-item .mt {
            font-weight: 700;
            margin-right: 4px;
        }

        .activity-item .mt-ADD {
            color: #3fb950;
        }

        .activity-item .mt-LINK {
            color: #58a6ff;
        }

        .activity-item .mt-MUTATE {
            color: #e3b341;
        }

        .activity-item .mt-UNLINK {
            color: #f85149;
        }

        .activity-ts {
            color: #5a7399;
            margin-left: 4px;
        }

        @keyframes fadein {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>mo:os Explorer</h1>
        <span class="badge">FUN02 UI_Lens</span>
        <span class="badge" style="background:#1f6feb">S4 read-only</span>
    </header>
    <div class="container">
        <div class="sidebar" id="sidebar">
            <div class="stats" id="stats"></div>
            <div class="controls">
                <label><input id="toggle-cat" type="checkbox"> show glossary urn:moos:cat:*</label>
                <label><input id="toggle-system" type="checkbox"> show kernel/feature nodes</label>
            </div>
            <input type="text" id="search" class="search-box" placeholder="Filter nodes…" autocomplete="off">
            <select id="scope-select" class="scope-select">
                <option value="">— Full graph (no scope) —</option>
            </select>
            <div id="scope-label" class="scope-label"></div>
            <h2>Nodes</h2>
            <div id="node-list">
                <div class="loading">Loading graph...</div>
            </div>
        </div>
        <div class="canvas-area">
            <svg id="graph">
                <g id="vp"></g>
            </svg>
        </div>
        <div class="activity-panel">
            <h2>Live Morphisms</h2>
            <div class="activity-list" id="activity-list"></div>
        </div>
    </div>
    <script>
        /* ── ontology-derived color map (21 type_ids, grouped by broad_category) ── */
        var kindColor = {
            /* identity */
            user: '#ffd166',
            collider_admin: '#f4a261',
            superadmin: '#e76f51',
            agent_spec: '#ef476f',
            /* structure */
            app_template: '#2a9d8f',
            node_container: '#4cc9f0',
            /* compute */
            agnostic_model: '#72efdd',
            system_tool: '#90be6d',
            compute_resource: '#5bc0be',
            provider: '#83c5be',
            /* surface */
            ui_lens: '#f7b267',
            runtime_surface: '#f4845f',
            /* protocol */
            protocol_adapter: '#9d4edd',
            /* infra */
            infra_service: '#577590',
            /* memory */
            memory_store: '#b8de6f',
            /* platform */
            platform_config: '#a5b4fc',
            workstation_config: '#818cf8',
            /* config */
            preference: '#c4b5fd',
            /* evaluation */
            benchmark_suite: '#fb923c',
            benchmark_task: '#fdba74',
            benchmark_score: '#fed7aa'
        };

        var stratumOpacity = { S0: 0.55, S1: 0.68, S2: 0.86, S3: 1.0, S4: 0.78 };

        var data = { nodes: [], edges: [] };
        var stats = document.getElementById('stats');
        var nodeList = document.getElementById('node-list');
        var svg = document.getElementById('graph');
        var toggleCat = document.getElementById('toggle-cat');
        var toggleSystem = document.getElementById('toggle-system');
        var searchInput = document.getElementById('search');
        var scopeSelect = document.getElementById('scope-select');
        var scopeLabel = document.getElementById('scope-label');

        var fullData = { nodes: [], edges: [] };
        var currentScopeURN = '';

        toggleCat.checked = false;
        toggleSystem.checked = false;

        function isGlossaryNode(n) {
            return typeof n.id === 'string' && n.id.indexOf('urn:moos:cat:') === 0;
        }

        function isKernelNode(n) {
            return typeof n.id === 'string' &&
                (n.id.indexOf('urn:moos:kernel:') === 0 ||
                    n.id.indexOf('urn:moos:feature:') === 0);
        }

        function nodeVisible(n) {
            if (!toggleCat.checked && isGlossaryNode(n)) return false;
            if (!toggleSystem.checked && isKernelNode(n)) return false;
            return true;
        }

        function edgeVisible(e, vis) {
            return vis.has(e.source) && vis.has(e.target);
        }

        function escapeHtml(s) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(s));
            return div.innerHTML;
        }

        function broadCategoryFromType(typeID) {
            switch (typeID) {
                case 'user':
                case 'collider_admin':
                case 'superadmin':
                case 'agent_spec':
                    return 'identity';
                case 'app_template':
                case 'node_container':
                    return 'structure';
                case 'agnostic_model':
                case 'system_tool':
                case 'compute_resource':
                case 'provider':
                    return 'compute';
                case 'ui_lens':
                case 'runtime_surface':
                    return 'surface';
                case 'protocol_adapter':
                    return 'protocol';
                case 'infra_service':
                    return 'infra';
                case 'memory_store':
                    return 'memory';
                case 'platform_config':
                case 'workstation_config':
                    return 'platform';
                case 'preference':
                    return 'config';
                case 'benchmark_suite':
                case 'benchmark_task':
                case 'benchmark_score':
                    return 'evaluation';
                default:
                    return 'unknown';
            }
        }

        function categoryColumnIndex(cat) {
            switch (cat) {
                case 'identity': return 0;
                case 'structure': return 1;
                case 'protocol': return 2;
                case 'compute': return 3;
                case 'surface': return 4;
                case 'infra': return 5;
                case 'memory': return 6;
                case 'platform': return 7;
                case 'config': return 8;
                case 'evaluation': return 9;
                default: return 10;
            }
        }

        function stratumRowIndex(s) {
            switch (s) {
                case 'S0': return 0;
                case 'S1': return 1;
                case 'S2': return 2;
                case 'S3': return 3;
                case 'S4': return 4;
                default: return 2;
            }
        }

        function categoryGridPosition(kind, stratum, index) {
            var col = categoryColumnIndex(broadCategoryFromType(kind));
            var row = stratumRowIndex(stratum || 'S2');
            var colW = 180;
            var rowH = 200;
            var cellCols = 4;
            var cx = (index % cellCols) * 40;
            var cy = Math.floor(index / cellCols) * 40;
            return {
                x: col * colW + cx + 40,
                y: row * rowH + cy + 40
            };
        }

        function graphStateToUIGraph(state) {
            var nodeObj = state && state.nodes ? state.nodes : {};
            var wireObj = state && state.wires ? state.wires : {};
            var nodes = [];
            var edges = [];
            var fullByID = {};
            fullData.nodes.forEach(function (n) { fullByID[n.id] = n; });

            var ids = Object.keys(nodeObj).sort();
            var bucketCount = {};
            ids.forEach(function (id) {
                var n = nodeObj[id] || {};
                var kind = n.type_id || n.TypeID || 'app_template';
                var stratum = n.stratum || n.Stratum || 'S2';
                var label = (n.payload && (n.payload.label || n.payload.name)) || n.label || id;
                var category = broadCategoryFromType(kind);
                var bucketKey = category + ':' + stratum;
                var idx = bucketCount[bucketKey] || 0;
                bucketCount[bucketKey] = idx + 1;
                var fallbackPos = categoryGridPosition(kind, stratum, idx);
                var fromFull = fullByID[id];
                nodes.push({
                    id: id,
                    kind: kind,
                    broad_category: category,
                    stratum: stratum,
                    label: label,
                    x: fromFull ? fromFull.x : fallbackPos.x,
                    y: fromFull ? fromFull.y : fallbackPos.y,
                    data: n.payload || {}
                });
            });

            Object.keys(wireObj).forEach(function (k) {
                var w = wireObj[k] || {};
                var source = w.source_urn || w.SourceURN || '';
                var target = w.target_urn || w.TargetURN || '';
                var sourcePort = w.source_port || w.SourcePort || '';
                var targetPort = w.target_port || w.TargetPort || '';
                edges.push({
                    id: k,
                    source: source,
                    target: target,
                    source_port: sourcePort,
                    target_port: targetPort,
                    label: sourcePort + ' -> ' + targetPort
                });
            });

            return { nodes: nodes, edges: edges };
        }

        function populateScopeSelector() {
            while (scopeSelect.options.length > 1) {
                scopeSelect.remove(1);
            }
            var byID = {};
            fullData.nodes.forEach(function (n) {
                var isScopeActor = n.kind === 'agent_spec' ||
                    n.kind === 'user' ||
                    n.kind === 'superadmin' ||
                    n.kind === 'collider_admin' ||
                    n.kind === 'node_container';
                if (isScopeActor) {
                    byID[n.id] = n;
                }
            });
            Object.keys(byID).sort().forEach(function (id) {
                var n = byID[id];
                var opt = document.createElement('option');
                opt.value = n.id;
                opt.textContent = (n.label || n.id) + ' (' + n.kind + ')';
                scopeSelect.appendChild(opt);
            });
        }

        var svgElems = {};

        function render() {
            while (nodeList.firstChild) nodeList.removeChild(nodeList.firstChild);
            var vpEl = document.getElementById('vp');
            while (vpEl.firstChild) vpEl.removeChild(vpEl.firstChild);
            svgElems = {};

            var allVisible = data.nodes.filter(nodeVisible);
            var q = (searchInput.value || '').trim().toLowerCase();
            var matching = q ? allVisible.filter(function (n) {
                return (n.id || '').toLowerCase().indexOf(q) >= 0 ||
                    (n.label || '').toLowerCase().indexOf(q) >= 0 ||
                    (n.kind || '').toLowerCase().indexOf(q) >= 0;
            }) : allVisible;
            var matchSet = new Set(matching.map(function (n) { return n.id; }));
            var vis = new Set(allVisible.map(function (n) { return n.id; }));
            var edges = data.edges.filter(function (e) { return edgeVisible(e, vis); });

            if (currentScopeURN) {
                stats.textContent = 'Scope: ' + allVisible.length + ' nodes, ' + edges.length +
                    ' edges (of ' + fullData.nodes.length + ' total)';
            } else {
                stats.textContent = q
                    ? matching.length + ' of ' + allVisible.length + ' nodes'
                    : allVisible.length + ' nodes, ' + edges.length + ' edges';
            }

            /* ── sidebar cards (search-filtered) ── */
            matching.forEach(function (n) {
                var color = kindColor[n.kind] || '#3fb950';
                var card = document.createElement('div');
                card.className = 'node-card';
                card.innerHTML =
                    '<div class="urn">' + escapeHtml(n.label || n.id) + '</div>' +
                    '<div class="node-meta">' +
                    '<span class="kind-pill" style="background:' + color + '">' + escapeHtml(n.kind || '?') + '</span>' +
                    '<span class="stratum-pill">' + escapeHtml(n.stratum || 'S?') + '</span>' +
                    '<span class="category-pill">' + escapeHtml(n.broad_category || '') + '</span>' +
                    '</div>';
                card.addEventListener('click', (function (node) {
                    return function () {
                        var el = svgElems[node.id];
                        if (!el) return;
                        var svgRect = svg.getBoundingClientRect();
                        vpState.x = svgRect.width / 2 - (node.x + 200) * vpState.k;
                        vpState.y = svgRect.height / 2 - (node.y + 60) * vpState.k;
                        applyVP();
                        el.classList.add('highlighted');
                        setTimeout(function () { el.classList.remove('highlighted'); }, 1500);
                    };
                }(n)));
                nodeList.appendChild(card);
            });

            /* ── SVG edges (full allVisible set) ── */
            var nodeMap = {};
            allVisible.forEach(function (n) { nodeMap[n.id] = n; });
            edges.forEach(function (e) {
                var src = nodeMap[e.source];
                var tgt = nodeMap[e.target];
                if (!src || !tgt) return;
                var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.setAttribute('class', 'edge');
                var x1 = src.x + 200, y1 = src.y + 60;
                var x2 = tgt.x + 200, y2 = tgt.y + 60;
                var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1); line.setAttribute('y1', y1);
                line.setAttribute('x2', x2); line.setAttribute('y2', y2);
                g.appendChild(line);
                var label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.setAttribute('x', (x1 + x2) / 2 + 4);
                label.setAttribute('y', (y1 + y2) / 2 - 4);
                label.textContent = e.label || '';
                g.appendChild(label);
                vpEl.appendChild(g);
            });

            /* ── SVG nodes (all visible, dim non-matching when searching) ── */
            allVisible.forEach(function (n) {
                var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                var cls = 'node' + (q && !matchSet.has(n.id) ? ' dim' : '');
                g.setAttribute('class', cls);
                g.setAttribute('transform', 'translate(' + (n.x + 200) + ',' + (n.y + 60) + ')');
                var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('r', 8);
                circle.setAttribute('fill', kindColor[n.kind] || '#3fb950');
                circle.setAttribute('fill-opacity', stratumOpacity[n.stratum] || 0.85);
                circle.setAttribute('stroke', '#c7d2fe');
                g.appendChild(circle);
                var text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('dx', 12); text.setAttribute('dy', 4);
                text.textContent = n.id.split(':').pop();
                g.appendChild(text);
                vpEl.appendChild(g);
                svgElems[n.id] = g;
            });
        }

        /* ── fetch projection from FUN02 endpoint ── */
        function fetchAndRender() {
            fetch('/functor/ui')
                .then(function (r) { return r.json(); })
                .then(function (d) {
                    fullData = d;
                    data = d;
                    currentScopeURN = '';
                    scopeSelect.value = '';
                    scopeLabel.textContent = '';
                    populateScopeSelector();
                    render();
                })
                .catch(function (err) {
                    nodeList.innerHTML = '<div class="loading" style="color:#f85149">Failed to load: ' + escapeHtml(String(err)) + '</div>';
                });
        }

        function appendToActivityLog(env) {
            var list = document.getElementById('activity-list');
            if (!list) { return; }
            var item = document.createElement('div');
            item.className = 'activity-item';
            var type = env.type || env.Type || '?';
            var actor = env.actor || env.Actor || '';
            var ts = env.applied_at || env.AppliedAt || '';
            var tsShort = ts ? new Date(ts).toISOString().replace('T', ' ').slice(11, 19) : '';
            item.innerHTML = '<span class="mt mt-' + escapeHtml(type) + '">' + escapeHtml(type) + '</span>' +
                escapeHtml(actor.split(':').pop() || actor) +
                '<span class="activity-ts">' + escapeHtml(tsShort) + '</span>';
            list.insertBefore(item, list.firstChild);
            // Keep last 20 entries
            while (list.children.length > 20) {
                list.removeChild(list.lastChild);
            }
        }

        /* ── SSE live update ── */
        var es = new EventSource('/log/stream');
        es.addEventListener('morphism', function (e) {
            try {
                var env = JSON.parse(e.data);
                appendToActivityLog(env);
                fetchAndRender();
            } catch (_) { }
        });

        fetchAndRender();

        toggleCat.addEventListener('change', render);
        toggleSystem.addEventListener('change', render);
        searchInput.addEventListener('input', render);
        scopeSelect.addEventListener('change', function () {
            var urn = scopeSelect.value || '';
            if (!urn) {
                currentScopeURN = '';
                data = fullData;
                scopeLabel.textContent = '';
                render();
                return;
            }

            fetch('/state/scope/' + encodeURIComponent(urn))
                .then(function (r) { return r.json(); })
                .then(function (state) {
                    currentScopeURN = urn;
                    data = graphStateToUIGraph(state);
                    scopeLabel.textContent = 'Scope: ' + (scopeSelect.options[scopeSelect.selectedIndex].textContent || urn);
                    render();
                })
                .catch(function (err) {
                    scopeLabel.textContent = 'Scope load failed: ' + String(err);
                });
        });

        /* ── pan / zoom ── */
        var vpState = { x: 0, y: 0, k: 1 };
        function applyVP() {
            var el = document.getElementById('vp');
            if (el) el.setAttribute('transform',
                'translate(' + vpState.x + ',' + vpState.y + ') scale(' + vpState.k + ')');
        }
        var drag = { active: false, sx: 0, sy: 0, tx: 0, ty: 0 };
        svg.addEventListener('mousedown', function (e) {
            drag.active = true; drag.sx = e.clientX; drag.sy = e.clientY;
            drag.tx = vpState.x; drag.ty = vpState.y;
            svg.classList.add('dragging');
            e.preventDefault();
        });
        window.addEventListener('mousemove', function (e) {
            if (!drag.active) return;
            vpState.x = drag.tx + (e.clientX - drag.sx);
            vpState.y = drag.ty + (e.clientY - drag.sy);
            applyVP();
        });
        window.addEventListener('mouseup', function () {
            drag.active = false;
            svg.classList.remove('dragging');
        });
        svg.addEventListener('wheel', function (e) {
            e.preventDefault();
            var factor = e.deltaY < 0 ? 1.1 : 0.9;
            vpState.k = Math.min(5, Math.max(0.15, vpState.k * factor));
            applyVP();
        }, { passive: false });
    </script>
</body>

</html>
