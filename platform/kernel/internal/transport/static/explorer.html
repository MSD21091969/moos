<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mo:os — Explorer (Data Lens)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", "Calibri", sans-serif;
            background: #0b1220;
            color: #dbe7ff;
        }

        header {
            padding: 12px 16px;
            border-bottom: 1px solid #27364f;
            background: #101a2d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        h1 {
            font-size: 16px;
            font-weight: 600;
        }

        .badge {
            display: inline-block;
            font-size: 11px;
            background: #1f6feb;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 8px;
        }

        .stats {
            font-size: 12px;
            color: #9fb4d7;
        }

        .toolbar {
            padding: 10px 12px;
            border-bottom: 1px solid #27364f;
            background: #0f1728;
            display: grid;
            gap: 8px;
            grid-template-columns: repeat(5, minmax(120px, 1fr));
        }

        .tool-field label {
            display: block;
            margin-bottom: 4px;
            font-size: 11px;
            color: #8b949e;
        }

        .tool-field select,
        .tool-field input {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30415f;
            color: #dbe7ff;
            border-radius: 4px;
            padding: 6px 8px;
            font-size: 12px;
        }

        .tool-field select[multiple] {
            min-height: 72px;
        }

        .tabs {
            padding: 8px 12px;
            border-bottom: 1px solid #27364f;
            background: #0f1728;
            display: flex;
            gap: 8px;
        }

        .tab-btn {
            border: 1px solid #30415f;
            background: #172238;
            color: #c9d1d9;
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #1f6feb;
            border-color: #388bfd;
            color: white;
        }

        .content {
            padding: 10px 12px;
            height: calc(100vh - 156px);
            overflow: auto;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        details {
            border: 1px solid #27364f;
            border-radius: 6px;
            background: #101a2d;
            margin-bottom: 10px;
        }

        summary {
            cursor: pointer;
            padding: 8px 10px;
            color: #9fb4d7;
            font-size: 12px;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        thead th {
            position: sticky;
            top: 0;
            z-index: 1;
            background: #151a2e;
            color: #9fb4d7;
            text-align: left;
            border-bottom: 1px solid #30415f;
            padding: 8px;
        }

        tbody td {
            border-bottom: 1px solid #1f2e47;
            padding: 7px 8px;
            vertical-align: top;
        }

        tbody tr:hover {
            background: #122033;
        }

        .mono {
            font-family: Consolas, Monaco, monospace;
            font-size: 11px;
            word-break: break-all;
        }

        .pill {
            border: 1px solid #3a5277;
            border-radius: 999px;
            padding: 1px 7px;
            font-size: 10px;
            color: #9fb4d7;
        }

        .expander {
            background: #0d1424;
            border: 1px solid #27364f;
            border-radius: 6px;
            padding: 8px;
            margin: 6px 0 10px;
        }

        pre {
            background: #0a1220;
            border: 1px solid #26334f;
            border-radius: 6px;
            padding: 8px;
            color: #b8de6f;
            overflow: auto;
            max-height: 260px;
        }

        .small-note {
            font-size: 11px;
            color: #8b949e;
            margin-top: 6px;
        }

        .row {
            cursor: pointer;
        }

        .filters-inline {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }

        .filters-inline select {
            background: #0d1117;
            border: 1px solid #30415f;
            color: #dbe7ff;
            border-radius: 4px;
            padding: 4px 6px;
            font-size: 12px;
        }

        .loading {
            color: #9fb4d7;
            font-size: 13px;
        }

        @media (max-width: 1100px) {
            .toolbar {
                grid-template-columns: repeat(2, minmax(120px, 1fr));
            }

            .content {
                height: calc(100vh - 230px);
            }
        }
    </style>
</head>

<body>
    <header>
        <div>
            <h1>mo:os Explorer <span class="badge">Data Lens</span></h1>
        </div>
        <div class="stats" id="stats">Loading...</div>
    </header>

    <div class="toolbar">
        <div class="tool-field">
            <label for="kind-filter">Kind</label>
            <select id="kind-filter" multiple>
                <option value="">— All —</option>
            </select>
        </div>
        <div class="tool-field">
            <label for="stratum-filter">Stratum</label>
            <select id="stratum-filter" multiple>
                <option value="">— All —</option>
                <option value="S0">S0</option>
                <option value="S1">S1</option>
                <option value="S2">S2</option>
                <option value="S3">S3</option>
                <option value="S4">S4</option>
            </select>
        </div>
        <div class="tool-field">
            <label for="category-filter">Category</label>
            <select id="category-filter" multiple>
                <option value="">— All —</option>
            </select>
        </div>
        <div class="tool-field">
            <label for="scope-filter">Scope</label>
            <select id="scope-filter">
                <option value="">— Full graph (no scope) —</option>
            </select>
        </div>
        <div class="tool-field">
            <label for="search-filter">Search</label>
            <input id="search-filter" type="text" placeholder="URN / label / kind">
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="objects">Objects</button>
        <button class="tab-btn" data-tab="morphisms">Morphisms</button>
        <button class="tab-btn" data-tab="ontology">Ontology</button>
        <button class="tab-btn" data-tab="log">Log</button>
    </div>

    <div class="content">
        <section id="tab-objects" class="tab-panel active"></section>
        <section id="tab-morphisms" class="tab-panel"></section>
        <section id="tab-ontology" class="tab-panel"></section>
        <section id="tab-log" class="tab-panel"></section>
    </div>

    <script>
        var stateData = { nodes: {}, wires: {} };
        var fullTotals = { nodes: 0, wires: 0 };
        var registryData = { types: {} };
        var logData = [];
        var expandedRows = {};
        var activeTab = 'objects';

        var statsEl = document.getElementById('stats');
        var objectsEl = document.getElementById('tab-objects');
        var morphismsEl = document.getElementById('tab-morphisms');
        var ontologyEl = document.getElementById('tab-ontology');
        var logEl = document.getElementById('tab-log');

        var kindFilter = document.getElementById('kind-filter');
        var stratumFilter = document.getElementById('stratum-filter');
        var categoryFilter = document.getElementById('category-filter');
        var scopeFilter = document.getElementById('scope-filter');
        var searchFilter = document.getElementById('search-filter');

        function isCatOntologyNode(node, urn) {
            return String(urn || '').indexOf('urn:moos:cat:') === 0 && String(node.type_id || '') === 'app_template';
        }

        function displayKind(node, urn) {
            if (isCatOntologyNode(node, urn)) return 'ontology_term';
            return String(node.type_id || 'unknown');
        }

        function displayCategory(node, urn) {
            if (isCatOntologyNode(node, urn)) return 'ontology';
            return broadCategory(node.type_id || '');
        }

        function escapeHtml(s) {
            var d = document.createElement('div');
            d.appendChild(document.createTextNode(String(s == null ? '' : s)));
            return d.innerHTML;
        }

        function broadCategory(kind) {
            switch (kind) {
                case 'user':
                case 'collider_admin':
                case 'superadmin':
                case 'agent_spec':
                    return 'identity';
                case 'app_template':
                case 'node_container':
                    return 'structure';
                case 'agnostic_model':
                case 'system_tool':
                case 'compute_resource':
                case 'provider':
                    return 'compute';
                case 'ui_lens':
                case 'runtime_surface':
                    return 'surface';
                case 'protocol_adapter':
                    return 'protocol';
                case 'infra_service':
                    return 'infra';
                case 'memory_store':
                    return 'memory';
                case 'platform_config':
                case 'workstation_config':
                    return 'platform';
                case 'preference':
                    return 'config';
                case 'benchmark_suite':
                case 'benchmark_task':
                case 'benchmark_score':
                    return 'evaluation';
                default:
                    return 'unknown';
            }
        }

        function selectedValues(selectEl) {
            var out = [];
            for (var i = 0; i < selectEl.options.length; i++) {
                var o = selectEl.options[i];
                if (o.selected && o.value) out.push(o.value);
            }
            return out;
        }

        function normalizeMultiSelect(selectEl) {
            if (!selectEl || !selectEl.multiple) return;

            var emptyOpt = null;
            var hasNonEmptySelected = false;
            for (var i = 0; i < selectEl.options.length; i++) {
                var o = selectEl.options[i];
                if (o.value === '') {
                    emptyOpt = o;
                    continue;
                }
                if (o.selected) hasNonEmptySelected = true;
            }
            if (!emptyOpt) return;

            if (emptyOpt.selected) {
                for (var j = 0; j < selectEl.options.length; j++) {
                    if (selectEl.options[j].value !== '') selectEl.options[j].selected = false;
                }
                return;
            }

            if (hasNonEmptySelected) {
                emptyOpt.selected = false;
            }
        }

        function nodeLabel(node, urn) {
            var p = node.payload || {};
            return p.label || p.name || urn;
        }

        function applyClientSearch(nodes) {
            var q = (searchFilter.value || '').trim().toLowerCase();
            if (!q) return nodes;
            return nodes.filter(function (x) {
                var n = x.node;
                var label = nodeLabel(n, x.urn);
                return x.urn.toLowerCase().indexOf(q) >= 0 ||
                    String(n.type_id || '').toLowerCase().indexOf(q) >= 0 ||
                    String(label).toLowerCase().indexOf(q) >= 0;
            });
        }

        function buildLensURL() {
            var q = [];
            var kinds = selectedValues(kindFilter);
            var strata = selectedValues(stratumFilter);
            var cats = selectedValues(categoryFilter);
            var scope = scopeFilter.value || '';
            if (kinds.length) q.push('kind=' + encodeURIComponent(kinds.join(',')));
            if (strata.length) q.push('stratum=' + encodeURIComponent(strata.join(',')));
            if (cats.length) q.push('category=' + encodeURIComponent(cats.join(',')));
            if (scope) q.push('scope=' + encodeURIComponent(scope));
            return '/state/lens' + (q.length ? ('?' + q.join('&')) : '');
        }

        function classifyWire(w) {
            return String(w.source_port || '').toUpperCase() || 'UNKNOWN';
        }

        function wireIndexForNode(urn) {
            var incoming = [];
            var outgoing = [];
            Object.keys(stateData.wires || {}).forEach(function (k) {
                var w = stateData.wires[k];
                if (w.source_urn === urn) outgoing.push(w);
                if (w.target_urn === urn) incoming.push(w);
            });
            return { incoming: incoming, outgoing: outgoing };
        }

        function renderStats() {
            var nodeCount = Object.keys(stateData.nodes || {}).length;
            var wireCount = Object.keys(stateData.wires || {}).length;
            var scope = scopeFilter.value ? (' | scope=' + scopeFilter.value) : '';
            statsEl.textContent = 'Data Lens: ' + nodeCount + ' nodes, ' + wireCount +
                ' wires (of ' + fullTotals.nodes + '/' + fullTotals.wires + ')' + scope;
        }

        function renderObjects() {
            var nodes = Object.keys(stateData.nodes || {}).map(function (urn) {
                return { urn: urn, node: stateData.nodes[urn] };
            });
            nodes = applyClientSearch(nodes);

            var groups = {};
            nodes.forEach(function (x) {
                var k = displayKind(x.node, x.urn);
                if (!groups[k]) groups[k] = [];
                groups[k].push(x);
            });

            var kinds = Object.keys(groups).sort();
            if (!kinds.length) {
                objectsEl.innerHTML = '<div class="loading">No objects match current filters.</div>';
                return;
            }

            var html = '';
            kinds.forEach(function (k) {
                var rows = groups[k].sort(function (a, b) { return a.urn.localeCompare(b.urn); });
                html += '<details open><summary>KIND: ' + escapeHtml(k) + ' (' + rows.length + ')</summary>';
                html += '<table><thead><tr>' +
                    '<th>URN</th><th>Stratum</th><th>Category</th><th>Label</th><th>Wires</th>' +
                    '</tr></thead><tbody>';

                rows.forEach(function (x) {
                    var n = x.node;
                    var idx = wireIndexForNode(x.urn);
                    var key = 'obj:' + x.urn;
                    var isOpen = !!expandedRows[key];
                    html += '<tr class="row" data-row-key="' + escapeHtml(key) + '">' +
                        '<td class="mono">' + escapeHtml(x.urn) + '</td>' +
                        '<td><span class="pill">' + escapeHtml(n.stratum || '') + '</span></td>' +
                        '<td>' + escapeHtml(displayCategory(n, x.urn)) + '</td>' +
                        '<td>' + escapeHtml(nodeLabel(n, x.urn)) + '</td>' +
                        '<td>' + (idx.incoming.length + idx.outgoing.length) + '</td>' +
                        '</tr>';

                    if (isOpen) {
                        html += '<tr><td colspan="5"><div class="expander">';
                        html += '<div class="small-note">Payload JSON</div>';
                        html += '<pre>' + escapeHtml(JSON.stringify(n.payload || {}, null, 2)) + '</pre>';

                        html += '<div class="small-note">Outgoing wires (' + idx.outgoing.length + ')</div>';
                        html += '<table><thead><tr><th>Target</th><th>Source Port</th><th>Target Port</th></tr></thead><tbody>';
                        idx.outgoing.forEach(function (w) {
                            html += '<tr><td class="mono">' + escapeHtml(w.target_urn) + '</td><td>' +
                                escapeHtml(w.source_port) + '</td><td>' + escapeHtml(w.target_port) + '</td></tr>';
                        });
                        html += '</tbody></table>';

                        html += '<div class="small-note">Incoming wires (' + idx.incoming.length + ')</div>';
                        html += '<table><thead><tr><th>Source</th><th>Source Port</th><th>Target Port</th></tr></thead><tbody>';
                        idx.incoming.forEach(function (w) {
                            html += '<tr><td class="mono">' + escapeHtml(w.source_urn) + '</td><td>' +
                                escapeHtml(w.source_port) + '</td><td>' + escapeHtml(w.target_port) + '</td></tr>';
                        });
                        html += '</tbody></table>';
                        html += '</div></td></tr>';
                    }
                });

                html += '</tbody></table></details>';
            });

            objectsEl.innerHTML = html;
            objectsEl.querySelectorAll('tr.row').forEach(function (row) {
                row.addEventListener('click', function () {
                    var key = row.getAttribute('data-row-key');
                    expandedRows[key] = !expandedRows[key];
                    renderObjects();
                });
            });
        }

        function renderMorphisms() {
            var groups = {};
            Object.keys(stateData.wires || {}).forEach(function (k) {
                var w = stateData.wires[k];
                var t = classifyWire(w);
                if (!groups[t]) groups[t] = [];
                groups[t].push({ id: k, wire: w });
            });

            var keys = Object.keys(groups).sort();
            if (!keys.length) {
                morphismsEl.innerHTML = '<div class="loading">No morphisms match current filters.</div>';
                return;
            }

            var html = '';
            keys.forEach(function (k) {
                var ws = groups[k];
                html += '<details open><summary>MORPHISM: ' + escapeHtml(k) + ' (' + ws.length + ')</summary>';
                html += '<table><thead><tr>' +
                    '<th>Source URN</th><th>Target URN</th><th>Source Port</th><th>Target Port</th><th>Source Stratum</th>' +
                    '</tr></thead><tbody>';
                ws.forEach(function (entry) {
                    var wireID = entry.id;
                    var w = entry.wire;
                    var srcNode = (stateData.nodes || {})[w.source_urn] || {};
                    var rowKey = 'morph:' + wireID;
                    var isOpen = !!expandedRows[rowKey];
                    html += '<tr class="row" data-row-key="' + escapeHtml(rowKey) + '">' +
                        '<td class="mono">' + escapeHtml(w.source_urn) + '</td>' +
                        '<td class="mono">' + escapeHtml(w.target_urn) + '</td>' +
                        '<td>' + escapeHtml(w.source_port) + '</td>' +
                        '<td>' + escapeHtml(w.target_port) + '</td>' +
                        '<td>' + escapeHtml(srcNode.stratum || '') + '</td>' +
                        '</tr>';

                    if (isOpen) {
                        html += '<tr><td colspan="5"><div class="expander">';
                        html += '<div class="small-note">Wire details</div>';
                        html += '<table><thead><tr><th>Wire ID</th><th>Source URN</th><th>Target URN</th><th>Source Port</th><th>Target Port</th></tr></thead><tbody>';
                        html += '<tr>' +
                            '<td class="mono">' + escapeHtml(wireID) + '</td>' +
                            '<td class="mono">' + escapeHtml(w.source_urn || '') + '</td>' +
                            '<td class="mono">' + escapeHtml(w.target_urn || '') + '</td>' +
                            '<td>' + escapeHtml(w.source_port || '') + '</td>' +
                            '<td>' + escapeHtml(w.target_port || '') + '</td>' +
                            '</tr>';
                        html += '</tbody></table>';
                        html += '</div></td></tr>';
                    }
                });
                html += '</tbody></table></details>';
            });
            morphismsEl.innerHTML = html;

            morphismsEl.querySelectorAll('tr.row').forEach(function (row) {
                row.addEventListener('click', function () {
                    var key = row.getAttribute('data-row-key');
                    expandedRows[key] = !expandedRows[key];
                    renderMorphisms();
                });
            });
        }

        function renderOntology() {
            var types = registryData.types || {};
            var keys = Object.keys(types).sort();
            if (!keys.length) {
                ontologyEl.innerHTML = '<div class="loading">No ontology registry data loaded.</div>';
                return;
            }

            var html = '<details open><summary>Kinds (' + keys.length + ')</summary>';
            html += '<table><thead><tr><th>Kind</th><th>Category</th><th>Allowed Strata</th><th>Ports</th></tr></thead><tbody>';
            var morphMap = {};

            keys.forEach(function (k) {
                var t = types[k] || {};
                var strata = (t.allowed_strata || []).join(', ');
                var ports = Object.keys(t.ports || {}).sort();
                var portText = ports.join(', ');
                html += '<tr>' +
                    '<td class="mono">' + escapeHtml(k) + '</td>' +
                    '<td>' + escapeHtml(broadCategory(k)) + '</td>' +
                    '<td>' + escapeHtml(strata) + '</td>' +
                    '<td class="mono">' + escapeHtml(portText) + '</td>' +
                    '</tr>';

                ports.forEach(function (p) {
                    var ps = t.ports[p] || {};
                    if (String(ps.direction || '').toLowerCase() !== 'out') return;
                    var id = String(p).toUpperCase();
                    if (!morphMap[id]) morphMap[id] = { sources: {}, targets: {} };
                    morphMap[id].sources[k] = true;
                    (ps.targets || []).forEach(function (tg) {
                        var tt = String((tg && tg.type_id) || '');
                        var tp = String((tg && tg.port) || '');
                        if (tt || tp) morphMap[id].targets[tt + ':' + tp] = true;
                    });
                });
            });
            html += '</tbody></table></details>';

            var morphKeys = Object.keys(morphMap).sort();
            html += '<details open><summary>Morphism-like Port Relations (' + morphKeys.length + ')</summary>';
            html += '<table><thead><tr><th>Type</th><th>Source Kinds</th><th>Target Kinds/Ports</th></tr></thead><tbody>';
            morphKeys.forEach(function (mk) {
                var m = morphMap[mk];
                var src = Object.keys(m.sources).sort().join(', ');
                var tgt = Object.keys(m.targets).sort().join(', ');
                html += '<tr><td class="mono">' + escapeHtml(mk) + '</td><td class="mono">' +
                    escapeHtml(src) + '</td><td class="mono">' + escapeHtml(tgt) + '</td></tr>';
            });
            html += '</tbody></table></details>';

            ontologyEl.innerHTML = html;
        }

        function renderLog() {
            var actorSet = {};
            (logData || []).forEach(function (e) {
                actorSet[String(e.entry && e.entry.envelope && e.entry.envelope.actor || '')] = true;
            });
            var actors = Object.keys(actorSet).filter(Boolean).sort();

            var html = '<div class="filters-inline">' +
                '<label>Actor:</label><select id="log-actor"><option value="">All</option>' +
                actors.map(function (a) { return '<option value="' + escapeHtml(a) + '">' + escapeHtml(a) + '</option>'; }).join('') +
                '</select>' +
                '<label>Type:</label><select id="log-type">' +
                '<option value="">All</option><option>ADD</option><option>LINK</option><option>MUTATE</option><option>UNLINK</option>' +
                '</select></div>';

            html += '<table><thead><tr><th>#</th><th>Actor</th><th>Target</th><th>Type</th><th>Timestamp</th></tr></thead><tbody id="log-body"></tbody></table>';
            logEl.innerHTML = html;

            function refill() {
                var actor = document.getElementById('log-actor').value;
                var typ = document.getElementById('log-type').value;
                var rows = (logData || []).slice().reverse().filter(function (e) {
                    var ea = String((e.entry && e.entry.envelope && e.entry.envelope.actor) || '');
                    var et = String((e.entry && e.entry.envelope && e.entry.envelope.type) || '');
                    if (actor && ea !== actor) return false;
                    if (typ && et !== typ) return false;
                    return true;
                });
                var body = rows.map(function (e, i) {
                    var env = (e.entry && e.entry.envelope) || {};
                    var target = '';
                    if (env.add && env.add.urn) target = env.add.urn;
                    else if (env.mutate && env.mutate.urn) target = env.mutate.urn;
                    else if (env.link && env.link.target_urn) target = env.link.target_urn;
                    else if (env.unlink && env.unlink.target_urn) target = env.unlink.target_urn;
                    return '<tr><td>' + e.seq + '</td>' +
                        '<td class="mono">' + escapeHtml(env.actor || '') + '</td>' +
                        '<td class="mono">' + escapeHtml(target) + '</td>' +
                        '<td>' + escapeHtml(env.type || '') + '</td>' +
                        '<td>' + escapeHtml((e.entry && e.entry.issued_at) || '') + '</td></tr>';
                }).join('');
                document.getElementById('log-body').innerHTML = body;
            }

            document.getElementById('log-actor').addEventListener('change', refill);
            document.getElementById('log-type').addEventListener('change', refill);
            refill();
        }

        function renderActiveTab() {
            renderStats();
            if (activeTab === 'objects') renderObjects();
            if (activeTab === 'morphisms') renderMorphisms();
            if (activeTab === 'ontology') renderOntology();
            if (activeTab === 'log') renderLog();
        }

        function populateFiltersFromState(state) {
            var nodes = state.nodes || {};
            var kinds = {};
            var cats = {};
            var scopes = {};
            Object.keys(nodes).forEach(function (urn) {
                var n = nodes[urn] || {};
                var k = String(n.type_id || '');
                if (k) {
                    kinds[k] = true;
                    cats[broadCategory(k)] = true;
                }
                if (k === 'agent_spec' || k === 'user' || k === 'superadmin' || k === 'collider_admin' || k === 'node_container') {
                    scopes[urn] = true;
                }
            });

            kindFilter.innerHTML = '<option value="">— All —</option>' + Object.keys(kinds).sort().map(function (k) {
                return '<option value="' + escapeHtml(k) + '">' + escapeHtml(k) + '</option>';
            }).join('');

            categoryFilter.innerHTML = '<option value="">— All —</option>' + Object.keys(cats).sort().map(function (c) {
                return '<option value="' + escapeHtml(c) + '">' + escapeHtml(c) + '</option>';
            }).join('');

            var current = scopeFilter.value || '';
            var opts = '<option value="">— Full graph (no scope) —</option>' +
                Object.keys(scopes).sort().map(function (s) {
                    return '<option value="' + escapeHtml(s) + '">' + escapeHtml(s) + '</option>';
                }).join('');
            scopeFilter.innerHTML = opts;
            scopeFilter.value = current;
        }

        function fetchJSON(url) {
            return fetch(url).then(function (r) {
                if (!r.ok) throw new Error(url + ' -> HTTP ' + r.status);
                return r.json();
            });
        }

        function reloadStateWithFilters() {
            var lensURL = buildLensURL();
            return fetchJSON(lensURL).then(function (state) {
                stateData = state || { nodes: {}, wires: {} };
                renderActiveTab();
            }).catch(function (err) {
                var msg = '<div class="loading">Failed to load filtered state: ' + escapeHtml(String(err)) + '</div>';
                objectsEl.innerHTML = msg;
                morphismsEl.innerHTML = msg;
            });
        }

        function initTabs() {
            document.querySelectorAll('.tab-btn').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    activeTab = btn.getAttribute('data-tab');
                    document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
                    btn.classList.add('active');
                    document.querySelectorAll('.tab-panel').forEach(function (p) { p.classList.remove('active'); });
                    document.getElementById('tab-' + activeTab).classList.add('active');
                    renderActiveTab();
                });
            });
        }

        function init() {
            initTabs();

            fetchJSON('/state').then(function (fullState) {
                fullTotals.nodes = Object.keys(fullState.nodes || {}).length;
                fullTotals.wires = Object.keys(fullState.wires || {}).length;
                populateFiltersFromState(fullState);
                return Promise.all([
                    reloadStateWithFilters(),
                    fetchJSON('/semantics/registry').then(function (r) { registryData = r || { types: {} }; }),
                    fetchJSON('/log').then(function (l) {
                        var raw = l || [];
                        logData = raw.map(function (entry, idx) {
                            return { entry: entry, seq: idx + 1 };
                        });
                    })
                ]);
            }).then(function () {
                renderActiveTab();
            }).catch(function (err) {
                var msg = '<div class="loading">Initialization failed: ' + escapeHtml(String(err)) + '</div>';
                objectsEl.innerHTML = msg;
                morphismsEl.innerHTML = msg;
                ontologyEl.innerHTML = msg;
                logEl.innerHTML = msg;
            });

            [kindFilter, stratumFilter, categoryFilter, scopeFilter].forEach(function (el) {
                el.addEventListener('change', function () {
                    if (el === kindFilter || el === stratumFilter || el === categoryFilter) {
                        normalizeMultiSelect(el);
                    }
                    expandedRows = {};
                    reloadStateWithFilters();
                });
            });
            searchFilter.addEventListener('input', function () {
                if (activeTab === 'objects') renderObjects();
                else renderActiveTab();
            });
        }

        init();
    </script>
</body>

</html>
