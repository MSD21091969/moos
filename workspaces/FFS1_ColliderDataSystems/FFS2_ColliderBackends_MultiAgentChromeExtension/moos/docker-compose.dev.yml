services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: moos
      POSTGRES_USER: moos
      POSTGRES_PASSWORD: moos
    ports:
      - '5432:5432'
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U moos -d moos' ]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 5s
      timeout: 3s
      retries: 10

  kernel:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    # Override entrypoint to use 'go run' for live reloading via Air or direct
    # hot-restart when source is mounted. For a lightweight alternative without
    # Air, kill + restart the container after source edits.
    command: [ 'go', 'run', './cmd/kernel' ]
    working_dir: /app
    volumes:
      # Mount source for live rebuilds. Requires the builder stage to have the
      # full Go toolchain (the multi-stage Dockerfile keeps it in 'builder').
      - .:/app
      - gomodcache:/root/go/pkg/mod
    environment:
      MOOS_HTTP_ADDR: ':8080'
      MOOS_WS_ADDR: ':18789'
      DATABASE_URL: 'postgres://moos:moos@postgres:5432/moos?sslmode=disable'
      REDIS_URL: 'redis://redis:6379'
      MOOS_MIGRATIONS_DIR: '/app/migrations'
      MOOS_MIGRATIONS_AUTO_APPLY: 'true'
      MOOS_MODEL_PROVIDER: '${MOOS_MODEL_PROVIDER:-anthropic}'
      MOOS_BEARER_TOKEN: '${MOOS_BEARER_TOKEN:-dev-token}'
      MOOS_SESSION_TTL: '${MOOS_SESSION_TTL:-30m}'
      ANTHROPIC_API_KEY: '${ANTHROPIC_API_KEY:-}'
      GEMINI_API_KEY: '${GEMINI_API_KEY:-}'
      OPENAI_API_KEY: '${OPENAI_API_KEY:-}'
      OPENAI_BASE_URL: '${OPENAI_BASE_URL:-}'
      OPENAI_MODEL: '${OPENAI_MODEL:-}'
    ports:
      - '8000:8080'
      - '8001:8080'
      - '8004:8080'
      - '18789:18789'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend-deps:
    image: node:20-bookworm-slim
    working_dir: /app
    command: [ 'bash', '-lc', 'corepack enable && pnpm install --frozen-lockfile' ]
    environment:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
    volumes:
      - .:/app
      - pnpmstore:/root/.pnpm-store
      - nodemodules:/app/node_modules

  sidepanel:
    image: node:20-bookworm-slim
    working_dir: /app
    command: [ 'bash', '-lc', './node_modules/.bin/vite --config apps/sidepanel/vite.config.mts --host 0.0.0.0 --port 4201' ]
    volumes:
      - .:/app
      - pnpmstore:/root/.pnpm-store
      - nodemodules:/app/node_modules
    environment:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
      VITE_DATA_SERVER_URL: '/moos-api'
      VITE_MOOS_BEARER_TOKEN: '${MOOS_BEARER_TOKEN:-dev-token}'
      VITE_AGENT_RUNNER_URL: 'ws://localhost:18789'
    ports:
      - '4201:4201'
    depends_on:
      frontend-deps:
        condition: service_completed_successfully
      kernel:
        condition: service_started

  viewer:
    image: node:20-bookworm-slim
    working_dir: /app
    command: [ 'bash', '-lc', './node_modules/.bin/vite --config apps/viewer/vite.config.mts --host 0.0.0.0 --port 4203' ]
    volumes:
      - .:/app
      - pnpmstore:/root/.pnpm-store
      - nodemodules:/app/node_modules
    environment:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
      VITE_DATA_SERVER_URL: '/moos-api'
      VITE_AGENT_RUNNER_URL: 'ws://localhost:18789'
    ports:
      - '4203:4203'
    depends_on:
      frontend-deps:
        condition: service_completed_successfully
      kernel:
        condition: service_started

volumes:
  pgdata_dev:
  gomodcache:
  pnpmstore:
  nodemodules:
