services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: moos
      POSTGRES_USER: moos
      POSTGRES_PASSWORD: moos
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U moos -d moos']
      interval: 5s
      timeout: 3s
      retries: 20

  kernel:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      MOOS_HTTP_ADDR: ':8080'
      MOOS_WS_ADDR: ':18789'
      DATABASE_URL: 'postgres://moos:moos@postgres:5432/moos?sslmode=disable'
      MOOS_MIGRATIONS_DIR: '/migrations'
      MOOS_MIGRATIONS_AUTO_APPLY: 'true'
    ports:
      - '8000:8080'
      - '18789:18789'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
