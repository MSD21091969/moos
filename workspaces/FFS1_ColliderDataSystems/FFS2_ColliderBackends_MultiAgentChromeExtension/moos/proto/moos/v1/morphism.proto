syntax = "proto3";

package moos.v1;

option go_package = "github.com/collider/moos/proto/moos/v1;moosv1";

import "moos/v1/container.proto";

// NOTE: Morphism names are intentionally frozen for compatibility.
enum MorphismType {
  MORPHISM_TYPE_UNSPECIFIED = 0;
  ADD = 1;
  LINK = 2;
  MUTATE = 3;
  UNLINK = 4;
}

message AddPayload {
  Container container = 1;
}

message LinkPayload {
  Wire wire = 1;
}

message MutatePayload {
  ContainerRef target = 1;
  string patch_json = 2;
}

message UnlinkPayload {
  ContainerRef source = 1;
  ContainerRef target = 2;
  string from_port = 3;
  string to_port = 4;
}

message MorphismEnvelope {
  string id = 1;
  MorphismType type = 2;
  string actor_urn = 3;
  string scope_urn = 4;
  int64 issued_at_unix_ms = 5;

  oneof payload {
    AddPayload add = 10;
    LinkPayload link = 11;
    MutatePayload mutate = 12;
    UnlinkPayload unlink = 13;
  }

  map<string, string> metadata = 20;
}
