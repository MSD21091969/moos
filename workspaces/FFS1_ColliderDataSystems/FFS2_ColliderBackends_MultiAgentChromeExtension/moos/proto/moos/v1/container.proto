syntax = "proto3";

package moos.v1;

option go_package = "github.com/collider/moos/proto/moos/v1;moosv1";

message PortSpec {
  string id = 1;
  string name = 2;
  string schema_json = 3;
  bool required = 4;
}

message ContainerInterface {
  repeated PortSpec inputs = 1;
  repeated PortSpec outputs = 2;
}

message Wire {
  string from_container_urn = 1;
  string from_port = 2;
  string to_container_urn = 3;
  string to_port = 4;
  string metadata_json = 5;
}

message Container {
  string urn = 1;
  string parent_urn = 2;
  string kind = 3;
  ContainerInterface interface = 4;
  string kernel_json = 5;
  repeated string children = 6;
  repeated Wire wiring = 7;
  string permissions_json = 8;
  uint64 version = 9;
  int64 created_at_unix_ms = 10;
  int64 updated_at_unix_ms = 11;
}

message ContainerRef {
  string urn = 1;
  uint64 expected_version = 2;
}
