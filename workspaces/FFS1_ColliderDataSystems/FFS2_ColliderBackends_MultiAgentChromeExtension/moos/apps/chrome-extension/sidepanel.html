<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Collider Sidepanel</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #fff;
        font-family: system-ui, sans-serif;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: 0;
      }
      .fallback {
        padding: 12px;
        font-size: 12px;
        color: #444;
      }
    </style>
  </head>
  <body>
    <iframe
      src="http://localhost:4201"
      title="FFS4 Sidepanel"
      onerror="document.body.innerHTML='<div class=\'fallback\'>FFS4 is not reachable on http://localhost:4201. Start the stack with start-moos-stack.ps1 -SidepanelOnly.</div>'"
    ></iframe>
  </body>
</html>
