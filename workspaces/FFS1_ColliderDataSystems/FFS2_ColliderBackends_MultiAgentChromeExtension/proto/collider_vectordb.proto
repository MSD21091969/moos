syntax = "proto3";

package collider_vectordb;

service ColliderVectorDb {
  // Index a tool for semantic search
  rpc IndexTool(ToolIndexRequest) returns (ToolIndexResponse);
  
  // Search for tools semantically
  rpc SearchTools(ToolSearchRequest) returns (ToolSearchResponse);
}

message ToolIndexRequest {
  string tool_name = 1;
  string description = 2;
  string origin_node_id = 3;
  string owner_user_id = 4;
  string params_schema_json = 5; // JSON string of parameters schema
}

message ToolIndexResponse {
  bool success = 1;
  string message = 2;
}

message ToolSearchRequest {
  string query = 1;
  int32 limit = 2; // Default to 5-10
  string owner_user_id = 3; // Optional filter
}

message ToolMatch {
  string tool_name = 1;
  string description = 2;
  float score = 3; // Similarity score
  string origin_node_id = 4;
}

message ToolSearchResponse {
  repeated ToolMatch matches = 1;
}
