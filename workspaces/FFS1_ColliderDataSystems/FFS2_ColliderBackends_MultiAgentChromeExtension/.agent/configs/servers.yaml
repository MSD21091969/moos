# Server Endpoints Configuration

# Data Server (FastAPI)
data_server:
  base_url: "http://localhost:8000"
  host_env: COLLIDER_HOST
  port_env: COLLIDER_PORT
  api_prefix: "/api/v1"

  endpoints:
    auth: "/auth"
    users: "/users"
    roles: "/users/{user_id}/assign-role"
    apps: "/apps"
    nodes: "/apps/{id}/nodes"
    permissions: "/permissions"
    app_permissions: "/apps/{id}/request-access"
    context: "/context"
    agent_bootstrap: "/agent/bootstrap/{node_id}"
    execution_tool: "/execution/tool/{name}"
    execution_workflow: "/execution/workflow/{name}"
    templates: "/templates"
    sse: "/sse"
    health: "/health"

# Graph Tool Server (Tool Registry + gRPC + MCP)
graphtool_server:
  base_url: "http://localhost:8001"
  port_env: GRAPHTOOL_PORT
  grpc_port: 50052

  endpoints:
    # REST - Tool Registry
    registry_tools: "/api/v1/registry/tools"
    registry_discover: "/api/v1/registry/tools/discover"
    # MCP
    mcp_sse: "/mcp/sse"
    mcp_messages: "/mcp/messages/"
    # WebSocket - Workflows
    ws_graph: "/ws/graph"
    ws_workflow: "/ws/workflow"
    # Health
    health: "/health"

# Vector Database Server (ChromaDB + gRPC)
vector_server:
  base_url: "http://localhost:8002"
  port_env: VECTORDB_PORT
  protocol: grpc

# Agent Runner (Context Composer)
agent_runner:
  base_url: "http://localhost:8004"
  port_env: AGENT_RUNNER_PORT

  endpoints:
    session: "/agent/session"
    root_session: "/agent/root/session"
    chat: "/agent/chat"
    discover_tools: "/tools/discover"
    health: "/health"

# NanoClawBridge (Claude Code WebSocket)
nanoclaw_bridge:
  base_url: "ws://127.0.0.1:18789"
  protocol: websocket
  # Spawns Claude Code CLI sessions with MCP tool access
  # URL returned by agent_runner session endpoints

# Native Messaging Host
native_host:
  name: "com.collider.agent_host"
