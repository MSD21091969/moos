# Server Endpoints Configuration

# Data Server (FastAPI)
data_server:
  base_url: "http://localhost:8000"
  api_prefix: "/api/v1"
  http_port: 8000
  grpc_port: 50051       # Internal service-to-service
  grpc_web_port: 8080    # Public/Proxy for Frontend

  endpoints:
    context: "/context"
    nodes: "/nodes"
    users: "/users"
    sync: "/sync"

# Graph Tool Server (Agent Runtime)
graphtool_server:
  base_url: "ws://localhost:8001"
  ws_port: 8001
  endpoints:
    graph: "/graph"
    workflow: "/workflow"

# Vector Database Server (ChromaDB)
vector_server:
  base_url: "http://localhost:8002"
  http_port: 8002

native_host:
  name: "com.collider.agent_host"
