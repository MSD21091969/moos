# Server Endpoints Configuration

# Data Server (FastAPI)
data_server:
  base_url: "http://localhost:8000"
  host_env: COLLIDER_HOST
  port_env: COLLIDER_PORT
  api_prefix: "/api/v1"

  endpoints:
    auth: "/auth"
    users: "/users"
    roles: "/users/{user_id}/assign-role"
    apps: "/apps"
    nodes: "/apps/{id}/nodes"
    permissions: "/permissions"
    app_permissions: "/apps/{id}/request-access"
    context: "/context"
    sse: "/sse"
    health: "/health"

# Graph Tool Server (Agent Runtime)
graphtool_server:
  base_url: "ws://localhost:8001"
  port_env: GRAPHTOOL_PORT
  endpoints:
    graph: "/graph"
    workflow: "/workflow"

# Vector Database Server (ChromaDB)
vector_server:
  base_url: "http://localhost:8002"
  port_env: VECTORDB_PORT

native_host:
  name: "com.collider.agent_host"
