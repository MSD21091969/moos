# Database Configuration

connections:
  # Main application database (async SQLite via aiosqlite)
  primary:
    driver: sqlite+aiosqlite
    url_env: COLLIDER_DATABASE_URL
    default_url: "sqlite+aiosqlite:///./collider.db"

  # Vector Store (ChromaDB)
  vector:
    persist_dir_env: VECTORDB_CHROMA_PERSIST_DIR
    default_persist_dir: "./chroma_data"

migrations:
  path: "alembic/"
  script_location: "alembic/versions"
