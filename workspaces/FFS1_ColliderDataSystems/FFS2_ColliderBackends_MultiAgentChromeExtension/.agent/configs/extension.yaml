# Chrome Extension Configuration

extension:
  name: "Collider Agent"
  version: "0.1.0"
  manifest_version: 3

permissions:
  - nativeMessaging
  - storage
  - unlimitedStorage  # For local Vector/Knowledge store
  - tabs
  - activeTab
  - scripting         # For DOM manipulation/extraction
  - alarms            # For scheduling agent jobs
  - notifications     # For long-running task completion alerts
  - background        # Implicit in MV3, but good to note context

native_host:
  name: "com.collider.agent_host"

offscreen:
  enabled: true
  reasons:
    - WORKERS         # For heavy processing without blocking UI
    - AUDIO_PLAYBACK  # (If needed)

sidepanel:
  enabled: true
  default_path: "sidepanel.html"
