# Logging Configuration
# Schema compatible with Python logging.config.dictConfig

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  json:
    class: "pythonjsonlogger.jsonlogger.JsonFormatter"
    format: "%(asctime)s %(levelname)s %(name)s %(message)s"

handlers:
  console:
    class: "logging.StreamHandler"
    level: "INFO"
    formatter: "standard"
    stream: "ext://sys.stdout"
  
  file:
    class: "logging.handlers.RotatingFileHandler"
    level: "DEBUG"
    formatter: "json"
    filename: "logs/collider.log"
    maxBytes: 10485760 # 10MB
    backupCount: 5

loggers:
  uvicorn:
    handlers: ["console"]
    level: "INFO"
    propagate: false
  
  collider:
    handlers: ["console", "file"]
    level: "DEBUG"
    propagate: false

root:
  handlers: ["console"]
  level: "WARNING"
