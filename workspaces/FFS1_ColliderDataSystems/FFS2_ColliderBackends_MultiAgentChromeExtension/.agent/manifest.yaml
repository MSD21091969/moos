# Agent Context Manifest - FFS2 ColliderBackends
# Backend services and Chrome Extension development

# Manifest metadata
name: collider-backends
version: "1.0.0"
display_name: Collider Backends & Extension
description: FastAPI backend servers and Plasmo Chrome Extension

# Inheritance settings
inheritance:
  enabled: true
  strategy: deep_merge

# Domain context
domain: development
components:
  - ColliderDataServer # REST/SSE API on :8000
  - ColliderGraphToolServer # WebSocket/Agents on :8001
  - ColliderVectorDbServer # Vector search on :8002
  - ColliderMultiAgentsChromeExtension # Plasmo extension

# Parent context (FFS1 workspace level)
includes:
  - path: "../.agent"
    type: workspace
    load:
      - instructions/agent_system.md
      - instructions/filesyst_domain.md
      - skills/ide_code_assist.md
      - tools/filesyst_tools.json

# Local context - Backend & Extension specific
# NOTE: Empty folders inherit from parent
local:
  instructions: "./instructions/"
  rules: "./rules/"
  skills: "./skills/"
  tools: "./tools/"
  configs: "./configs/"
  knowledge: "./knowledge/"
  workflows: "./workflows/"

# Exports - provides codebase knowledge to sibling workspaces
exports:
  # Internal Rules
  - instructions/agent_system.md
  - knowledge/codebase.md
  # Service Rules
  - rules/backend_api_design.md

# Secrets required by backend services
secrets:
  - OPENAI_API_KEY
  - GEMINI_API_KEY
  - FIREBASE_PROJECT_ID
  - COLLIDER_DATABASE_URL
  - CHROMADB_HOST

# Permission requirements
permissions:
  require_auth: true
  default_role: viewer
