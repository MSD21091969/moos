syntax = "proto3";

package collider.data;

// ---------------------------------------------------------------------------
// ColliderData — gRPC service on the DataServer (:8000)
//
// Provides context delivery to Agent Runners and tool registration
// forwarding to the GraphToolServer.
// ---------------------------------------------------------------------------

service ColliderData {
  // Read the container for a node
  rpc GetContext (ContextRequest) returns (ContextResponse);

  // Write / update a container
  rpc SetContext (SetContextRequest) returns (ContextResponse);

  // Register a tool defined in a container (DataServer validates,
  // then forwards to GraphToolServer)
  rpc RegisterTool (ToolRegistration) returns (ToolRegistrationResponse);

  // Stream real-time context updates (replaces SSE for agent runners)
  rpc StreamContextUpdates (ContextFilter) returns (stream ContextEvent);
}

// ---------------------------------------------------------------------------
// Messages
// ---------------------------------------------------------------------------

message ContextRequest {
  string node_id = 1;
  string user_id = 2;
  string application_id = 3;
  string path = 4;            // Optional: lookup by path instead of node_id
}

message SetContextRequest {
  string application_id = 1;
  string path = 2;
  string user_id = 3;
  bytes container_json = 4;   // Serialised NodeContainer
}

message ContextResponse {
  string node_id = 1;
  string application_id = 2;
  string path = 3;
  bytes container_json = 4;   // Serialised NodeContainer
}

message ToolRegistration {
  string tool_name = 1;
  string origin_node_id = 2;
  string owner_user_id = 3;
  bytes params_schema_json = 4;   // JSON Schema
  string code_ref = 5;
  string visibility = 6;         // "local" | "group" | "global"
}

message ToolRegistrationResponse {
  bool success = 1;
  string tool_name = 2;
  string message = 3;
}

message ContextFilter {
  string application_id = 1;
  string user_id = 2;
  repeated string node_ids = 3;   // Optional: subscribe to specific nodes
}

message ContextEvent {
  string event_type = 1;          // "node_updated" | "node_created" | "node_deleted"
  string node_id = 2;
  string path = 3;
  bytes container_json = 4;
  int64 timestamp_ms = 5;
}
