# Agent Context Manifest - FFS1 ColliderDataSystems
# Root workspace for Collider Data Systems

# Manifest metadata
name: collider-data-systems
version: "1.0.0"
display_name: Collider Data Systems
description: Multi-agent system for context-aware AI applications

# Inheritance settings
inheritance:
  enabled: true
  strategy: deep_merge # Options: deep_merge, replace, disabled

# Parent context (factory level)
includes:
  - path: "../../.agent"
    type: factory
    load:
      - rules/sandbox.md
      - rules/code_patterns.md
      - instructions/knowledge_hierarchy.md
      - instructions/instruction_inheritance.md

# Local context directories
local:
  instructions: "./instructions/"
  rules: "./rules/"
  skills: "./skills/"
  tools: "./tools/"
  configs: "./configs/"
  knowledge: "./knowledge/"
  workflows: "./workflows/"

# Exports to child workspaces (FFS2, FFS3, etc.)
# NOTE: cloud/admin domain instructions belong in DB containers (seed.py), not IDE .agent
exports:
  - instructions/agent_system.md
  - instructions/filesyst_domain.md
  - skills/ide_code_assist.md
  - tools/filesyst_tools.json
  - configs/domains.yaml
  # Rules
  - rules/stack_standards.md
  - rules/communication_architecture.md
  - rules/code_quality.md
  - rules/project_structure.md

# Secrets this workspace may use (injected at runtime)
secrets:
  - OPENAI_API_KEY
  - GOOGLE_AI_API_KEY
  - FIREBASE_PROJECT_ID

# Permission requirements
permissions:
  require_auth: true
  default_role: viewer # viewer, editor, admin
