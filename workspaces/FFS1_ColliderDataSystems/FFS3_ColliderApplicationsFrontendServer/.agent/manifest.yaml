# Agent Context Manifest - FFS3 ColliderFrontend
# Frontend Application Server (Nx + Vite/Next.js + React 19)

# Manifest metadata
name: collider-frontend-server
version: '2.0.0'
display_name: Collider Frontend Server
description: Nx monorepo with Vite + React 19 applications (Next.js supported via @nx/next)

# Inheritance settings
inheritance:
  enabled: true
  strategy: deep_merge

# Domain context
domain: frontend
framework: nx-react # bundler-agnostic: Vite default, Next.js optional
components:
  - apps/ffs4/ # Sidepanel appnode (Vite + React 19)
  - apps/ffs5/ # PiP appnode (Vite + React 19)
  - apps/ffs6/ # IDE viewer appnode (Vite + React 19, default project)
  - libs/shared-ui/ # @collider/shared-ui (shared components + utilities)

key_libraries:
  - '@xyflow/react' # Graph visualization (XYFlow)

# Parent context (FFS1 workspace level)
includes:
  - path: '../.agent'
    type: workspace
    load:
      - instructions/agent_system.md
      - instructions/filesyst_domain.md
      - configs/domains.yaml

# Local context - Frontend specific
# NOTE: Empty folders inherit from parent
local:
  instructions: './instructions/'
  rules: './rules/'
  skills: './skills/'
  tools: './tools/'
  configs: './configs/'
  knowledge: './knowledge/'
  workflows: './workflows/'

# Exports to child apps
exports:
  - knowledge/codebase.md

# Secrets for frontend builds (Vite env vars)
secrets:
  - VITE_API_BASE
  - VITE_FIREBASE_CONFIG

# Permission requirements
permissions:
  require_auth: true
  default_role: viewer
