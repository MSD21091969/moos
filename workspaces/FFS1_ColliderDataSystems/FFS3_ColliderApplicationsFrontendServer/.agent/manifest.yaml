# Agent Context Manifest - FFS3 ColliderFrontend
# Frontend Application Server (Nx + Next.js)

# Manifest metadata
name: collider-frontend-server
version: "1.0.0"
display_name: Collider Frontend Server
description: Nx monorepo with Next.js applications and shared libraries

# Inheritance settings
inheritance:
  enabled: true
  strategy: deep_merge

# Domain context
domain: frontend
framework: nx-next
components:
  - collider-frontend/ # Nx workspace root
  - apps/portal/ # Main portal Next.js app
  - libs/api-client/ # @collider/api-client
  - libs/shared-ui/ # @collider/shared-ui
  - libs/node-container/ # @collider/node-container

# Parent context (FFS1 workspace level)
includes:
  - path: "../.agent"
    type: workspace
    load:
      - instructions/agent_system.md
      - instructions/filesyst_domain.md
      - rules/extension_boundaries.md
      - rules/context_loading.md
      - configs/domains.yaml

# Local context - Frontend specific
# NOTE: Empty folders inherit from parent
local:
  instructions: "./instructions/"
  rules: "./rules/"
  skills: "./skills/"
  tools: "./tools/"
  configs: "./configs/"
  knowledge: "./knowledge/"
  workflows: "./workflows/"

# Exports to application folders (FFS4-FFS10)
exports:
  - knowledge/codebase.md

# Secrets for frontend builds
secrets:
  - NEXT_PUBLIC_API_BASE
  - NEXT_PUBLIC_FIREBASE_CONFIG

# Permission requirements
permissions:
  require_auth: true
  default_role: viewer
