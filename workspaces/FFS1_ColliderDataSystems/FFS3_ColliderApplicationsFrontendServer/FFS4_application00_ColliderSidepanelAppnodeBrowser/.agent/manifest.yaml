# Agent Context Manifest - FFS4 Sidepanel Application
# Chrome Extension Sidepanel for appnode browsing

# Manifest metadata
name: collider-sidepanel
version: "1.0.0"
display_name: Collider Sidepanel Browser
description: Chrome extension sidepanel for browsing and managing appnodes

# Inheritance settings
inheritance:
  enabled: true
  strategy: deep_merge

# Domain context
domain: sidepanel
app_type: extension-ui
features:
  - appnode_browser
  - container_tree
  - quick_actions

# Parent context (FFS3 frontend level)
includes:
  - path: "../.agent"
    type: workspace
    load:
      - knowledge/codebase.md

# Local context
local:
  instructions: "./instructions/"
  rules: "./rules/"
  skills: "./skills/"
  tools: "./tools/"
  configs: "./configs/"
  knowledge: "./knowledge/"
  workflows: "./workflows/"

# Leaf node - no exports
exports: []

# Permissions
permissions:
  require_auth: true
  default_role: viewer
