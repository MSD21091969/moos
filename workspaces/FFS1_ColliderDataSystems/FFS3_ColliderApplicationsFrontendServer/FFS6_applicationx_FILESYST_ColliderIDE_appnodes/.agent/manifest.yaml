# Agent Context Manifest - FFS6 FILESYST Application
# Local filesystem IDE integration appnodes

# Manifest metadata
name: collider-filesyst
version: "1.0.0"
display_name: Collider FILESYST IDE
description: Local filesystem access via native messaging for IDE features

# Inheritance settings
inheritance:
  enabled: true
  strategy: deep_merge

# Domain context
domain: filesyst
app_type: native-integration
features:
  - file_browser
  - code_editor
  - native_messaging
  - project_tree

# Parent context (FFS3 frontend level)
includes:
  - path: "../.agent"
    type: workspace
    load:
      - knowledge/codebase.md

# Local context
local:
  instructions: "./instructions/"
  rules: "./rules/"
  skills: "./skills/"
  tools: "./tools/"
  configs: "./configs/"
  knowledge: "./knowledge/"
  workflows: "./workflows/"

# Leaf node - no exports
exports: []

# Secrets for filesystem operations
secrets:
  - NATIVE_HOST_PATH

# Permissions - requires write for file ops
permissions:
  require_auth: true
  default_role: editor
