# Agent Context Manifest - FFS5 AgentSeat Application
# Picture-in-Picture main agent interface

# Manifest metadata
name: collider-agentseat
version: "1.0.0"
display_name: Collider AgentSeat (PiP)
description: Main AI agent interface in Picture-in-Picture mode

# Inheritance settings
inheritance:
  enabled: true
  strategy: deep_merge

# Domain context
domain: agentseat
app_type: pip-overlay
features:
  - agent_conversation
  - context_display
  - tool_invocation
  - streaming_output

# Parent context (FFS3 frontend level)
includes:
  - path: "../.agent"
    type: workspace
    load:
      - knowledge/codebase.md

# Local context
local:
  instructions: "./instructions/"
  rules: "./rules/"
  skills: "./skills/"
  tools: "./tools/"
  configs: "./configs/"
  knowledge: "./knowledge/"
  workflows: "./workflows/"

# Leaf node - no exports
exports: []

# Permissions
permissions:
  require_auth: true
  default_role: viewer
