# Agent Context Manifest - FFS10 Cloud App: Future External Website 2
# Future cloud application placeholder

# Manifest metadata
name: future-external-website2
version: "0.1.0"
display_name: Future External Website 2
description: Reserved cloud application slot for external website integration

# Inheritance settings
inheritance:
  enabled: true
  strategy: deep_merge

# Domain context
domain: cloud
app_type: web-app
app_id: future-external-website2
status: planned
features:
  - tbd

# Parent context (FFS3 frontend level)
includes:
  - path: "../.agent"
    type: workspace
    load:
      - knowledge/codebase.md

# Local context
local:
  instructions: "./instructions/"
  rules: "./rules/"
  skills: "./skills/"
  tools: "./tools/"
  configs: "./configs/"
  knowledge: "./knowledge/"
  workflows: "./workflows/"

# Leaf node - no exports
exports: []

# Permissions
permissions:
  require_auth: true
  default_role: viewer
