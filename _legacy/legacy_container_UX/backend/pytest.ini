[pytest]
# Pytest configuration for Collider API tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Ensure project root is on sys.path for tests and local hooks
pythonpath = .

# Test paths
testpaths = tests

# Output options
addopts = --strict-markers --tb=short -W "ignore::DeprecationWarning" -ra -v
markers =
    unit: Unit tests (fast, mocked dependencies)
    integration: Integration tests (real components, mocked external services)
    e2e: End-to-end tests (full system)
    slow: Slow tests (skip with -m "not slow")
    firestore: Tests requiring Firestore emulator (Phase 10)

# Async test configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Coverage options
[coverage:run]
source = src
omit =
    */tests/*
    */__pycache__/*
    */venv/*
    */.venv/*
    */conftest.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
