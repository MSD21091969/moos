version: '3.8'

services:
  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: collider-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Firestore emulator for local development
  firestore:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    container_name: collider-firestore
    ports:
      - "8080:8080"
    command: >
      gcloud beta emulators firestore start
      --host-port=0.0.0.0:8080
      --project=my-tiny-data-collider-dev
    environment:
      - CLOUDSDK_CORE_PROJECT=my-tiny-data-collider-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
    driver: local

networks:
  default:
    name: collider-network
