# Local UX Configuration
# Factory-level defaults for the local-ux CLI tool
#
# This config is loaded by workspace_agent.py and can be overridden
# at workspace level via .agent/configs/local_ux.yaml

# Default model for LLM calls
# Format: "provider:model" (e.g., "google-gla:gemini-2.0-flash")
model: "google-gla:gemini-2.0-flash"

# Temperature for LLM responses (0.0 - 1.0)
temperature: 0.7

# Maximum tokens for LLM responses
max_tokens: 4096

# Backend API URL (for pilot mode, future use)
api_url: "http://localhost:8000"

# Logging
log_level: "INFO"
