schema_version: "1.0.0"
updated_at: "2026-03-04"
owner: "FFS0_Factory"
description: "Formal Settings surface for workspace-wide defaults."

# Settings only: paths, flags, logging, UI defaults, and default ids.
# Do not place secret names, credentials, or provider contracts in this file.

# Path resolution defaults
paths:
  factory_root: "${FACTORY_ROOT:-D:/FFS0_Factory/moos}"
  agents_dir: ".agent"
  pilots_dir: "shared/pilots"
  knowledge_dir: "knowledge"
  secrets_dir: "${FACTORY_ROOT}/secrets"

# Agent runtime defaults
agent_defaults:
  # Reference canonical models from api_providers.yaml
  model: "gemini-2.5-flash"
  temperature: 0.7
  max_tokens: 4096
  retries: 3

  history:
    summarization_threshold: 8000
    keep_messages: 10

# Pilot/UI defaults
pilot_defaults:
  model: "gemini-2.5-flash"
  temperature: 0.7
  max_tokens: 8192

  ui:
    position: "bottom-right"
    theme: "dark"

# Feature flags & Safety
features:
  enable_filesystem_tools: false
  enable_subagents: true
  enable_todo_decomposition: false

  # Governance override: Root CLAUDE.md policies apply
  # "Auto-approve all tool uses"
  require_tool_approval: false

# Observability
logging:
  level: "INFO"
  format: "[{time}] {level}: {message}"
  output: "console"
