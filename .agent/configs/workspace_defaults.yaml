# Workspace Default Settings
# Inherited by all child workspaces via manifest.yaml includes

paths:
  # Factory root (resolved at runtime)
  factory_root: "${FACTORY_ROOT:-D:/factory}"
  
  # Standard locations relative to any workspace
  agents_dir: ".agent"
  pilots_dir: "shared/pilots"
  knowledge_dir: "knowledge"
  secrets_dir: "${FACTORY_ROOT}/secrets"

agent_defaults:
  # Default LLM settings for workspace agents
  model: "gemini-2.0-flash"
  temperature: 0.7
  max_tokens: 4096
  retries: 3
  
  # History management
  summarization:
    trigger_tokens: 8000
    keep_messages: 10

pilot_defaults:
  # Default LLM settings for application pilots
  model: "gemini-2.0-flash"
  temperature: 0.7
  max_tokens: 8192
  
  # UI defaults
  position: "bottom-right"
  theme: "dark"

# Feature flags
features:
  enable_filesystem_tools: false  # Must be explicitly enabled per agent
  enable_subagents: false
  enable_todo_decomposition: false
  require_tool_approval: true  # Safety default

# Logging
logging:
  level: "INFO"
  format: "[{time}] {level}: {message}"
  output: "console"  # or "file" or "both"
