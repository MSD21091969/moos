schema_version: "1.0.0"
updated_at: "2026-03-02"
owner: "FFS0_Factory"
description: "Formal Registry surface for AI providers, auth contracts, and model catalogs. Secrets are resolved from secrets/api_keys.env."

# Registry only: provider ids, base URLs, auth kinds, required secret key names,
# and supported models. Do not place secret values or workspace defaults here.

defaults:
  provider: gemini
  model: gemini-3.1-pro

providers:
  gemini:
    name: "Google AI Studio"
    base_url: "https://generativelanguage.googleapis.com"
    auth:
      type: "api_key"
      env_key: "GEMINI_API_KEY"
    models:
      - id: gemini-2.5-flash
      - id: gemini-2.5-flash-lite
      - id: gemini-2.5-pro
      - id: gemini-3-flash
      - id: gemini-3-pro
      - id: gemini-3.1-pro
        is_default: true

  google-vertex:
    name: "Google Vertex AI"
    base_url: null # Uses gcloud/ADC
    auth:
      type: "google_application_credentials"
      env_key: "GOOGLE_APPLICATION_CREDENTIALS"
    models:
      - id: gemini-2.5-flash
      - id: gemini-2.5-pro
      - id: gemini-3-flash
      - id: gemini-3-pro
      - id: gemini-3.1-pro
      - id: claude-opus-4-6
        is_default: true
      - id: claude-sonnet-4-6

  ollama:
    name: "Ollama (Local)"
    base_url: "http://localhost:11434"
    auth:
      type: "none"
    models:
      - id: qwen2.5:14b
        is_default: true
      - id: llama3.2:latest
      - id: codellama:13b

  openai:
    name: "OpenAI"
    base_url: "https://api.openai.com/v1"
    auth:
      type: "api_key"
      env_key: "OPENAI_API_KEY"
    models:
      - id: gpt-4o
      - id: gpt-4o-mini
      - id: gpt-5.1
      - id: gpt-5.1-codex
      - id: gpt-5.1-codex-max
      - id: gpt-5.1-codex-mini
      - id: gpt-5.2
      - id: gpt-5.2-codex
      - id: gpt-5.3-codex
        is_default: true
      - id: o1-preview
      - id: o3-pro

  anthropic:
    name: "Anthropic"
    base_url: "https://api.anthropic.com/v1"
    auth:
      type: "api_key"
      env_key: "ANTHROPIC_API_KEY"
    models:
      - id: claude-haiku-4.5
      - id: claude-sonnet-4
      - id: claude-sonnet-4.5
      - id: claude-sonnet-4.6
      - id: claude-opus-4
      - id: claude-opus-4.5
      - id: claude-opus-4-6
        is_default: true
      - id: claude-opus-4-6-fast
