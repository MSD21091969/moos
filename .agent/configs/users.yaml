# Factory Seed Users
# Used by ColliderDataServer seed.py (username/password auth)

users:
  Sam:
    system_role: superadmin
    display_name: "Sam"
  Lola:
    system_role: collider_admin
    display_name: "Lola"
  Menno:
    system_role: collider_admin
    display_name: "Menno"

# System roles (on User model, assigned by SAD/CAD only)
system_roles:
  - superadmin        # Full system access (SAD)
  - collider_admin    # Can assign roles, manage all apps (CAD)
  - app_admin         # Can create apps, grant app permissions
  - app_user          # Basic authenticated user

# App roles (on AppPermission, per-application)
app_roles:
  - app_admin   # Owner/admin of an application
  - app_user    # Regular member

# Auth methods by component
auth:
  dataserver:
    method: username_password
    jwt_algorithm: HS256
    note: "Direct auth for DataServer API"
  extension:
    method: firebase_google_signin
    note: "Planned for Chrome extension sign-in"
