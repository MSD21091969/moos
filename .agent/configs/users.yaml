schema_version: "1.0.0"
updated_at: "2026-03-02"
owner: "FFS0_Factory"
description: "Defines the RBAC schema and authentication profiles. This file does not contain actual user data."

# Roles automatically seeded/managed by system
rbac_catalog:
  system_roles:
    - id: superadmin
      description: "Full system access (SAD)"
    - id: collider_admin
      description: "Can assign roles, manage all apps (CAD)"
    - id: app_admin
      description: "Can create apps, grant app permissions"
    - id: app_user
      description: "Basic authenticated user"

  app_roles:
    - id: app_admin
      description: "Owner/admin of an application"
    - id: app_user
      description: "Regular member"

# Authentication profiles
auth_profiles:
  dataserver:
    method: username_password
    jwt_algorithm: HS256
    description: "Direct auth for DataServer API"
  extension:
    method: firebase_google_signin
    description: "Planned for Chrome extension sign-in"
