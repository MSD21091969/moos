schema_version: "1.0.0"
updated_at: "2026-03-08"
owner: "FFS0_Factory"
description: "Defines the formal identity-object access schema and authentication profiles. This file does not contain actual user data."

identity_objects:
  - id: superadmin
    ontology_ref: OBJ03
    type_id: superadmin
    description: "Transitive ownership across all active categories."
    source_morphisms:
      - OWNS
      - CAN_HYDRATE
      - PRE_FLIGHT_CONFIG
      - CAN_SCHEDULE
      - CAN_FEDERATE
    structure_capabilities:
      - ontology_ref: OBJ05
        action: "Can create NodeContainers and govern all reachable descendants."

  - id: collider_admin
    ontology_ref: OBJ02
    type_id: collider_admin
    description: "Governed administrator for assigned categories and containers."
    source_morphisms:
      - OWNS
      - CAN_HYDRATE
      - PRE_FLIGHT_CONFIG
    structure_capabilities:
      - ontology_ref: OBJ05
        action: "Can create NodeContainers within assigned governance scope."

  - id: user
    ontology_ref: OBJ01
    type_id: user
    description: "Authenticated actor with owned-workspace access."
    source_morphisms:
      - OWNS
      - CAN_HYDRATE
    structure_capabilities: []

governance_notes:
  - "Identity is modeled as objects and source morphisms, not as application permission labels."
  - "Application is a projection surface, not an ontological access unit."
  - "NodeContainer creation semantics reference OBJ05."

# Authentication profiles
auth_profiles:
  dataserver:
    method: username_password
    jwt_algorithm: HS256
    description: "Direct auth for DataServer API"
  extension:
    method: firebase_google_signin
    description: "Planned for Chrome extension sign-in"
