name: Markdown Lint

on:
  pull_request:
    paths:
      - 'workspaces/FFS1_ColliderDataSystems/**/*.md'
      - 'workspaces/FFS1_ColliderDataSystems/package.json'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/markdown-lint.yml'
  push:
    branches: [main]
    paths:
      - 'workspaces/FFS1_ColliderDataSystems/**/*.md'
      - 'workspaces/FFS1_ColliderDataSystems/package.json'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/markdown-lint.yml'

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Run markdown lint
        run: pnpm --dir workspaces/FFS1_ColliderDataSystems run lint:md